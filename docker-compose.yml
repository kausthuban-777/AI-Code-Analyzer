version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - '11434:11434'
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    networks:
      - ai-analyzer
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:11434/api/tags']
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: analyzer
      POSTGRES_PASSWORD: analyzer-dev-password
      POSTGRES_DB: ai_code_analyzer
      POSTGRES_INITDB_ARGS: -c shared_preload_libraries=pg_stat_statements
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ai-analyzer
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U analyzer']
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - ai-analyzer
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: dev-secret-key
      DATABASE_URL: postgresql://analyzer:analyzer-dev-password@postgres:5432/ai_code_analyzer
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2:7b-instruct
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - ai-analyzer

  sandbox:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.sandbox
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox-data:/app/sandbox
    networks:
      - ai-analyzer

volumes:
  ollama-data:
  postgres-data:
  redis-data:
  sandbox-data:

networks:
  ai-analyzer:
    driver: bridge
